name: Build & Publish Frontend Image

# ──────────────────────────────────────────────────────────────
# Baut bei jedem Push auf main ein Docker-Image des Frontends und
# pusht es in die GitHub Container Registry (ghcr.io).
#
# Image:  ghcr.io/vsys-ain-ss2026/campus-app
# Tags:   latest, sha-<commit>, main
#
# Nach dem Push wird per SSH in den Droplet deployed: /campus-app/restart.sh
# zieht das neue Image und startet den Container neu.
#
# Konfiguration (Settings → Secrets and variables → Actions):
#   Secrets:
#     VITE_SUPABASE_URL        Supabase Projekt-URL
#     VITE_SUPABASE_ANON_KEY   Supabase anon/publishable Key (Browser-sicher)
#     DROPLET_HOST             IP / Hostname des Droplets
#     DROPLET_USER             SSH-Benutzer (z.B. deploy oder root)
#     DROPLET_SSH_KEY          Privater SSH-Key (PEM, ganzer Inhalt)
#     DROPLET_SSH_PORT         (optional) SSH-Port, Default 22
#   Variables:
#     VITE_MAGIC_LINK_REDIRECT_URL   Redirect-URL des Deployments
#                                    (z.B. https://campus-app.example.org)
#
# Hinweis: VITE_* wird zur BUILD-Zeit in das Bundle eingebacken. Das Image
# ist damit an genau diese Werte (und Umgebung) gebunden.
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_MAGIC_LINK_REDIRECT_URL=${{ vars.VITE_MAGIC_LINK_REDIRECT_URL }}

      - name: Deploy to droplet (run restart.sh)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          script: bash /campus-app/restart.sh
