server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets never change content → cache aggressively
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Same-origin proxy to Uptime Kuma's public status-page JSON API so the
    # browser can poll service health without CORS. Only the JSON API is
    # proxied (not the Kuma UI, whose /assets/* would collide with the SPA).
    # The full status page lives on the status.<domain> subdomain.
    location /api/status-page/ {
        resolver 127.0.0.11 valid=30s;            # Docker embedded DNS
        set $kuma http://uptime-kuma:3001;
        proxy_pass $kuma$request_uri;
        proxy_set_header Host $host;
    }

    # vue-router uses createWebHistory() → all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
