server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets never change content → cache aggressively
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # NOTE: the status banner no longer proxies through this server. Uptime Kuma
    # is deployed independently (see deploy/monitoring/) and the client polls its
    # public status-page JSON API directly on the status.<domain> subdomain
    # (VITE_STATUS_API_BASE). That keeps health reporting alive even when this
    # client container is down — the whole point of monitoring the client server.

    # vue-router uses createWebHistory() → all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
