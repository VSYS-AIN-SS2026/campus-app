server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets never change content → cache aggressively
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must be revalidated on every load so clients pick up
    # new deployments instead of running a stale, cached worker.
    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Web app manifest: serve with the correct MIME type and revalidate.
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # vue-router uses createWebHistory() → all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
