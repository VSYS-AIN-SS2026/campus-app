<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Campus App">
  <defs>
    <linearGradient id="tile" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#005ca9"/>
      <stop offset="1" stop-color="#00457f"/>
    </linearGradient>
    <clipPath id="page">
      <rect x="136" y="168" width="240" height="232" rx="30"/>
    </clipPath>
  </defs>

  <!-- App tile -->
  <rect width="512" height="512" rx="112" fill="url(#tile)"/>

  <!-- Binding tabs -->
  <rect x="190" y="148" width="22" height="46" rx="11" fill="#ffffff"/>
  <rect x="300" y="148" width="22" height="46" rx="11" fill="#ffffff"/>

  <!-- Calendar page -->
  <rect x="136" y="168" width="240" height="232" rx="30" fill="#ffffff"/>

  <!-- Header band (clipped to page so top corners stay rounded) -->
  <g clip-path="url(#page)">
    <rect x="136" y="168" width="240" height="60" fill="#2f79b8"/>
  </g>

  <!-- Day grid -->
  <g fill="#c9d9ea">
    <circle cx="192" cy="276" r="10"/>
    <circle cx="320" cy="276" r="10"/>
    <circle cx="192" cy="316" r="10"/>
    <circle cx="320" cy="316" r="10"/>
    <circle cx="192" cy="356" r="10"/>
    <circle cx="256" cy="356" r="10"/>
    <circle cx="320" cy="356" r="10"/>
  </g>

  <!-- Today -->
  <circle cx="256" cy="316" r="15" fill="#005ca9"/>
</svg>
